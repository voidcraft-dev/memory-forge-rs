name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            rust-targets: ''
            tauri-args: ''
          - platform: macos-latest
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
            tauri-args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04
            rust-targets: ''
            tauri-args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Memory Forge ${{ github.ref_name }}'
          releaseBody: |
            ## Memory Forge ${{ github.ref_name }}

            ### 下载 / Download

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | Windows | `*_x64-setup.exe` | 安装包（推荐） |
            | Windows | `*_x64_en-US.msi` | MSI 安装包 |
            | macOS | `*_universal.dmg` | 通用版（Intel + Apple Silicon） |
            | Linux | `*_amd64.AppImage` | 免安装，双击运行 |
            | Linux | `*_amd64.deb` | Debian/Ubuntu 安装包 |
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.tauri-args }}
