name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            rust-targets: ''
            tauri-args: ''
          - platform: macos-latest
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
            tauri-args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04
            rust-targets: ''
            tauri-args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Memory Forge ${{ github.ref_name }}'
          releaseBody: |
            ## Memory Forge ${{ github.ref_name }}

            ### 更新 / Changes

            - Kiro IDE: 修复 `On it.` 占位消息无法加载真实执行输出的问题，并改为按需异步批量加载，降低大对话卡死风险。
            - 导出: Markdown 导出新增“包含工具调用历史 / Include tool history”选项，支持 Claude、Codex、OpenCode 的工具调用记录。
            - Gemini CLI: 支持 `.jsonl` 会话文件，过滤空助手消息，并去重重复消息更新。
            - Codex / omx: 新增 Codex 项目根目录过滤，可按 `cwd` 聚合同一项目根下的多项目会话。
            - 稳定性: 补充解析与导出相关测试，覆盖 Kiro 输出加载、工具调用导出、Gemini CLI 解析、Codex 项目过滤。

            ### 下载 / Download

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | Windows | `*_x64-setup.exe` | 安装包（推荐） |
            | Windows | `*_x64-portable.zip` | 便携版（解压即用） |
            | Windows | `*_x64_en-US.msi` | MSI 安装包 |
            | macOS | `*_universal.dmg` | 通用版（Intel + Apple Silicon） |
            | Linux | `*_amd64.AppImage` | 免安装，双击运行 |
            | Linux | `*_amd64.deb` | Debian/Ubuntu 安装包 |
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.tauri-args }}

      - name: Package Windows portable zip
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $exe = "src-tauri\target\release\memory-forge.exe"
          $zip = "Memory.Forge_${{ github.ref_name }}_x64-portable.zip"
          Compress-Archive -Path $exe -DestinationPath $zip
          echo "PORTABLE_ZIP=$zip" >> $env:GITHUB_ENV

      - name: Upload Windows portable zip to Release
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ env.PORTABLE_ZIP }}
