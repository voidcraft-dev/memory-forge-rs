<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
  </defs>

  <!-- 铁砧底座 -->
  <path d="M140 240 L140 280 Q140 288 148 288 L364 288 Q372 288 372 280 L372 240 Z"
        fill="url(#primaryGrad)"/>

  <!-- 铁砧主体 -->
  <path d="M180 160 L180 240 L332 240 L332 160 Q332 140 312 140 L200 140 Q180 140 180 160 Z"
        fill="url(#primaryGrad)"/>

  <!-- 铁砧顶部（大脑形状） -->
  <path d="M200 140 Q180 140 170 120 Q160 100 170 80 Q180 60 200 60 Q220 60 230 70 Q240 60 256 60 Q272 60 282 70 Q292 60 312 60 Q332 60 342 80 Q352 100 342 120 Q332 140 312 140 L200 140 Z"
        fill="url(#accentGrad)"/>

  <!-- 大脑纹理线条 -->
  <path d="M190 90 Q200 100 210 90"
        fill="none" stroke="#F1F5F9" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <path d="M230 75 Q240 85 250 75"
        fill="none" stroke="#F1F5F9" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <path d="M270 90 Q280 100 290 90"
        fill="none" stroke="#F1F5F9" stroke-width="3" stroke-linecap="round" opacity="0.6"/>

  <!-- 锻造火花效果 -->
  <circle cx="150" cy="200" r="4" fill="#06B6D4" opacity="0.8"/>
  <circle cx="165" cy="185" r="3" fill="#06B6D4" opacity="0.6"/>
  <circle cx="347" cy="200" r="4" fill="#06B6D4" opacity="0.8"/>
  <circle cx="362" cy="185" r="3" fill="#06B6D4" opacity="0.6"/>

  <!-- 品牌名 -->
  <text x="256" y="380"
        font-family="'Segoe UI',system-ui,sans-serif"
        font-size="56"
        font-weight="700"
        fill="#0F172A"
        text-anchor="middle"
        letter-spacing="4">
    MEMORY
  </text>
  <text x="256" y="440"
        font-family="'Segoe UI',system-ui,sans-serif"
        font-size="56"
        font-weight="700"
        fill="#0F172A"
        text-anchor="middle"
        letter-spacing="4">
    FORGE
  </text>
</svg>
